<svg width="400" height="400" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Sfondo navy con angoli arrotondati -->
  <rect x="0" y="0" width="200" height="200" rx="36" fill="#0c1445"/>

  <!-- Mulinello: 4 archi circolari (stesso raggio), estremità arrotondate, ruotati di 90° -->
  <g fill="none" stroke-linecap="round" stroke-width="30">
    <path d="M 95.64,50.19 A 50,50 0 0 1 149.81,95.64" stroke="#FFC72C" transform="rotate(0 100 100)"/>
    <path d="M 95.64,50.19 A 50,50 0 0 1 149.81,95.64" stroke="#1E9E5A" transform="rotate(90 100 100)"/>
    <path d="M 95.64,50.19 A 50,50 0 0 1 149.81,95.64" stroke="#FFC72C" transform="rotate(180 100 100)"/>
    <path d="M 95.64,50.19 A 50,50 0 0 1 149.81,95.64" stroke="#1E9E5A" transform="rotate(270 100 100)"/>
  </g>

  <!-- Stella rossa centrale a 5 punte -->
  <path d="M 100,76
